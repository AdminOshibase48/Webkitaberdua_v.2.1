<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Keuangan - OurStory Together</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" href="favicon.ico" />
    <link rel="stylesheet" href="css/globals.css" />
    <link rel="stylesheet" href="css/theme.css" />
    <link rel="stylesheet" href="css/glass.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/responsive.css" />
    <link rel="stylesheet" href="css/animations.css" />
</head>
<body>
    <div id="app">
        <header class="page-header glass">
            <button class="back-btn" onclick="window.location.href='dashboard.html'">←</button>
            <h1>💰 Keuangan Bersama</h1>
            <div></div>
        </header>

        <!-- Finance Summary -->
        <div class="finance-summary">
            <div class="summary-card glass">
                <span class="summary-label">Total Saldo</span>
                <span class="summary-value" id="total-balance">Rp 0</span>
            </div>
            <div class="summary-card glass">
                <span class="summary-label">Pemasukan Bulan Ini</span>
                <span class="summary-value income" id="total-income">Rp 0</span>
            </div>
            <div class="summary-card glass">
                <span class="summary-label">Pengeluaran Bulan Ini</span>
                <span class="summary-value expense" id="total-expense">Rp 0</span>
            </div>
            <div class="summary-card glass">
                <span class="summary-label">Tabungan</span>
                <span class="summary-value savings" id="total-savings">Rp 0</span>
            </div>
        </div>

        <!-- Quick Actions -->
        <div class="finance-actions" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 0.5rem; padding: 0 0.75rem; max-width: 1200px; margin: 0 auto;">
            <button class="action-btn glass" id="add-income">+ Pemasukan</button>
            <button class="action-btn glass" id="add-expense">- Pengeluaran</button>
            <button class="action-btn glass" id="add-savings">💾 Tabungan</button>
        </div>

        <!-- Recent Transactions -->
        <div class="transactions glass">
            <h3 style="margin-bottom: 0.75rem;">Transaksi Terbaru</h3>
            <div id="transactions-list">
                <p class="empty-state">Belum ada transaksi</p>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav glass">
            <a href="dashboard.html" class="nav-item">
                <span class="nav-icon">🏠</span>
                <span class="nav-label">Home</span>
            </a>
            <a href="chat.html" class="nav-item">
                <span class="nav-icon">💬</span>
                <span class="nav-label">Chat</span>
            </a>
            <a href="memories.html" class="nav-item">
                <span class="nav-icon">📸</span>
                <span class="nav-label">Memories</span>
            </a>
            <a href="ai.html" class="nav-item">
                <span class="nav-icon">🤖</span>
                <span class="nav-label">AI</span>
            </a>
            <a href="settings.html" class="nav-item">
                <span class="nav-icon">⚙️</span>
                <span class="nav-label">Settings</span>
            </a>
        </nav>
    </div>

    <!-- Transaction Modal -->
    <div id="transaction-modal" class="modal hidden">
        <div class="modal-content glass">
            <h2 id="transaction-modal-title">Tambah Transaksi</h2>
            <form id="transaction-form">
                <div class="form-group">
                    <label for="transaction-type">Tipe</label>
                    <select id="transaction-type" required>
                        <option value="income">Pemasukan</option>
                        <option value="expense">Pengeluaran</option>
                        <option value="savings">Tabungan</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="transaction-amount">Jumlah (Rp)</label>
                    <input type="number" id="transaction-amount" placeholder="0" required min="0" step="1000" />
                </div>
                <div class="form-group">
                    <label for="transaction-category">Kategori</label>
                    <input type="text" id="transaction-category" placeholder="e.g., Makanan, Sewa, Gaji" />
                </div>
                <div class="form-group">
                    <label for="transaction-description">Deskripsi</label>
                    <input type="text" id="transaction-description" placeholder="Deskripsi transaksi" />
                </div>
                <button type="submit" class="btn btn-primary btn-full">Simpan Transaksi</button>
                <button type="button" class="btn btn-secondary btn-full" id="close-modal" style="margin-top: 0.5rem;">Batal</button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/utils.js"></script>
    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/finance.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
