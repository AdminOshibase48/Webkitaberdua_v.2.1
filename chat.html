<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat - OurStory Together</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" href="favicon.ico" />
    <link rel="stylesheet" href="css/globals.css" />
    <link rel="stylesheet" href="css/theme.css" />
    <link rel="stylesheet" href="css/glass.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/responsive.css" />
    <link rel="stylesheet" href="css/animations.css" />
</head>
<body>
    <div id="app">
        <!-- Chat Header -->
        <header class="chat-header glass">
            <button class="back-btn" onclick="window.location.href='/dashboard.html'">←</button>
            <div class="chat-partner-info">
                <span class="partner-avatar">💑</span>
                <div>
                    <h2 id="chat-partner-name">Partner</h2>
                    <span class="partner-status online">Online</span>
                </div>
            </div>
            <div class="chat-actions">
                <button class="icon-btn" id="search-chat">🔍</button>
                <button class="icon-btn" id="chat-menu">⋯</button>
            </div>
        </header>

        <!-- Messages -->
        <div class="messages-container" id="messages-container">
            <div class="messages" id="messages">
                <!-- Messages will be rendered here -->
            </div>
        </div>

        <!-- Typing Indicator -->
        <div id="typing-indicator" class="typing-indicator hidden">
            <span>Partner is typing...</span>
        </div>

        <!-- Message Input -->
        <div class="chat-input glass">
            <button class="input-action" id="emoji-btn">😊</button>
            <button class="input-action" id="attach-btn">📎</button>
            <input type="text" id="message-input" placeholder="Type a message..." />
            <button class="input-action" id="send-btn">📤</button>
        </div>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav glass">
            <a href="/dashboard.html" class="nav-item">
                <span class="nav-icon">🏠</span>
                <span class="nav-label">Home</span>
            </a>
            <a href="chat.html" class="nav-item active">
                <span class="nav-icon">💬</span>
                <span class="nav-label">Chat</span>
            </a>
            <a href="memories.html" class="nav-item">
                <span class="nav-icon">📸</span>
                <span class="nav-label">Memories</span>
            </a>
            <a href="finance.html" class="nav-item">
                <span class="nav-icon">💰</span>
                <span class="nav-label">Finance</span>
            </a>
            <a href="settings.html" class="nav-item">
                <span class="nav-icon">⚙️</span>
                <span class="nav-label">Settings</span>
            </a>
        </nav>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/utils.js"></script>
    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/chat.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
