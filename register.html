<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daftar - OurStory Together</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" href="favicon.ico" />
    <link rel="stylesheet" href="css/globals.css" />
    <link rel="stylesheet" href="css/theme.css" />
    <link rel="stylesheet" href="css/glass.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/responsive.css" />
    <link rel="stylesheet" href="css/animations.css" />
</head>
<body>
    <div class="auth-container">
        <div class="auth-card glass">
            <div class="auth-header">
                <div class="logo">
                    <span class="logo-icon">💕</span>
                    <span class="logo-text">OurStory</span>
                </div>
                <h1>Mulai Perjalanan Anda</h1>
                <p>Buat akun dan mulailah cerita cinta Anda</p>
            </div>
            
            <form id="register-form" class="auth-form">
                <div class="form-group">
                    <label for="full-name">Nama Lengkap</label>
                    <input type="text" id="full-name" placeholder="Nama lengkap Anda" required autocomplete="name" />
                </div>
                <div class="form-group">
                    <label for="email">Alamat Email</label>
                    <input type="email" id="email" placeholder="anda@example.com" required autocomplete="email" />
                </div>
                <div class="form-group">
                    <label for="password">Kata Sandi</label>
                    <input type="password" id="password" placeholder="Minimal 6 karakter" required minlength="6" autocomplete="new-password" />
                </div>
                <div class="form-group">
                    <label for="partner-email">Email Pasangan (Opsional)</label>
                    <input type="email" id="partner-email" placeholder="pasangan@example.com" autocomplete="email" />
                    <small style="color: var(--text-secondary); font-size: 0.75rem;">Masukkan email pasangan jika sudah mendaftar</small>
                </div>
                <button type="submit" class="btn btn-primary btn-full">Buat Akun ✨</button>
            </form>
            
            <div class="auth-footer">
                <p>Sudah punya akun? <a href="login.html">Masuk</a></p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/utils.js"></script>
    <script src="js/supabase.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
