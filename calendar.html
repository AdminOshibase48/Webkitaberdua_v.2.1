<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calendar - OurStory Together</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="stylesheet" href="css/globals.css" />
    <link rel="stylesheet" href="css/theme.css" />
    <link rel="stylesheet" href="css/glass.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/responsive.css" />
    <link rel="stylesheet" href="css/animations.css" />
</head>
<body>
    <div id="app">
        <header class="page-header glass">
            <button class="back-btn" onclick="window.location.href='/dashboard.html'">←</button>
            <h1>📅 Calendar</h1>
            <button class="icon-btn" id="add-event-btn">➕</button>
        </header>

        <!-- Calendar Navigation -->
        <div class="calendar-nav">
            <button class="nav-btn" id="prev-month">←</button>
            <h2 id="current-month">January 2026</h2>
            <button class="nav-btn" id="next-month">→</button>
        </div>

        <!-- Calendar Grid -->
        <div class="calendar-grid" id="calendar-grid">
            <!-- Generated by JavaScript -->
        </div>

        <!-- Events List -->
        <div class="events-list glass">
            <h3>📋 Upcoming Events</h3>
            <div id="events-list">
                <p class="empty-state">No events scheduled</p>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav glass">
            <a href="dashboard.html" class="nav-item">
                <span class="nav-icon">🏠</span>
                <span class="nav-label">Home</span>
            </a>
            <a href="chat.html" class="nav-item">
                <span class="nav-icon">💬</span>
                <span class="nav-label">Chat</span>
            </a>
            <a href="memories.html" class="nav-item">
                <span class="nav-icon">📸</span>
                <span class="nav-label">Memories</span>
            </a>
            <a href="finance.html" class="nav-item">
                <span class="nav-icon">💰</span>
                <span class="nav-label">Finance</span>
            </a>
            <a href="settings.html" class="nav-item">
                <span class="nav-icon">⚙️</span>
                <span class="nav-label">Settings</span>
            </a>
        </nav>
    </div>

    <!-- Event Modal -->
    <div id="event-modal" class="modal hidden">
        <div class="modal-content glass">
            <h2>Add Event</h2>
            <form id="event-form">
                <div class="form-group">
                    <label for="event-title">Title</label>
                    <input type="text" id="event-title" placeholder="Event title" required />
                </div>
                <div class="form-group">
                    <label for="event-date">Date</label>
                    <input type="date" id="event-date" required />
                </div>
                <div class="form-group">
                    <label for="event-type">Type</label>
                    <select id="event-type">
                        <option value="anniversary">Anniversary</option>
                        <option value="date">Date</option>
                        <option value="reminder">Reminder</option>
                        <option value="birthday">Birthday</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary btn-full">Add Event</button>
                <button type="button" class="btn btn-secondary btn-full" id="close-event-modal">Cancel</button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/utils.js"></script>
    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/calendar.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
